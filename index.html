<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeID - Simplu</title>
    <style>
        body {
            font-family: Arial;
            background: #2d5016;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        button {
            background: #4a7c23;
            color: white;
            border: none;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin: 10px 0;
        }
        .species {
            display: inline-block;
            background: #f0f0f0;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            cursor: pointer;
        }
        .selected {
            background: #4a7c23;
            color: white;
        }
        .result {
            background: #2d5016;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 TreeID</h1>
        <p>Identificare copaci - Versiune simplă</p>

        <button id="galleryBtn">📷 Selectează din galerie</button>
        <button id="cameraBtn">📸 Fă o poză</button>

        <div id="preview" style="display:none;">
            <img id="image">
            <button id="identifyBtn">🔍 Identifică specia</button>
            <button id="cancelBtn">❌ Anulează</button>
        </div>

        <hr>

        <h3>SAU selectează manual:</h3>
        <div id="speciesList"></div>
        <button id="manualBtn">✅ Confirmă selecția</button>

        <div id="location"></div>
        <div id="history"></div>
        <button id="exportBtn">📥 Exportă CSV</button>
        <button id="clearHistoryBtn">🗑️ Șterge istoric</button>

        <div id="result" style="display:none;" class="result"></div>
    </div>

    <script>
        const species = {
            'Stejar': 'Copac mare cu frunze lobate, lemn tare folosit la mobilier',
            'Fag': 'Copac cu scoarță netedă, lemn folosit la parchet',
            'Brad': 'Conifer cu coroană conică, folosit la decorațiuni',
            'Pin': 'Conifer cu ace lungi, lemn pentru construcții',
            'Mesteacăn': 'Copac cu scoarță albă, lemn pentru placaj',
            'Arțar': 'Frunze palmate, cunoscut pentru sirop',
            'Tei': 'Frunze în formă de inimă, flori parfumate folosite la ceai',
            'Salcie': 'Crește lângă apă, ramuri plângătoare'
        };

        let currentImage = null;
        let currentLocation = null;
        let selectedSpecies = null;
        let history = [];

        // Inițializare
        function init() {
            loadHistory();
            showSpecies();
            getLocation();
            
            document.getElementById('galleryBtn').onclick = () => pickImage('gallery');
            document.getElementById('cameraBtn').onclick = () => pickImage('camera');
            document.getElementById('identifyBtn').onclick = identifyTree;
            document.getElementById('cancelBtn').onclick = cancelPreview;
            document.getElementById('manualBtn').onclick = manualSelect;
            document.getElementById('exportBtn').onclick = exportCSV;
            document.getElementById('clearHistoryBtn').onclick = clearHistory;
        }

        function pickImage(type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            if (type === 'camera') input.capture = 'environment';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        currentImage = ev.target.result;
                        document.getElementById('image').src = currentImage;
                        document.getElementById('preview').style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function identifyTree() {
            if (!currentImage) {
                alert('Selectează o imagine mai întâi!');
                return;
            }
            // Simulează identificare AI - alege aleator
            const speciesList = Object.keys(species);
            const random = speciesList[Math.floor(Math.random() * speciesList.length)];
            showResult(random, Math.floor(Math.random() * 30) + 70);
        }

        function showSpecies() {
            const container = document.getElementById('speciesList');
            container.innerHTML = '';
            Object.keys(species).forEach(name => {
                const btn = document.createElement('button');
                btn.textContent = name;
                btn.className = 'species';
                btn.onclick = () => {
                    selectedSpecies = name;
                    document.querySelectorAll('.species').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                container.appendChild(btn);
            });
        }

        function manualSelect() {
            if (!selectedSpecies) {
                alert('Selectează o specie din listă!');
                return;
            }
            showResult(selectedSpecies, 98);
        }

        function showResult(speciesName, confidence) {
            const date = new Date().toLocaleString();
            const html = `
                <h2>🌳 ${speciesName}</h2>
                <p>Încredere: ${confidence}%</p>
                <p><strong>Descriere:</strong> ${species[speciesName]}</p>
                <p><strong>Data:</strong> ${date}</p>
                ${currentLocation ? `<p><strong>Locație:</strong> ${currentLocation.lat}, ${currentLocation.lon}</p>` : ''}
            `;
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').style.display = 'block';
            
            // Salvează în istoric
            history.unshift({
                id: Date.now(),
                species: speciesName,
                confidence: confidence,
                date: new Date().toISOString(),
                location: currentLocation
            });
            saveHistory();
            showHistory();
            
            // Ascunde preview
            document.getElementById('preview').style.display = 'none';
            currentImage = null;
            
            // Ascunde rezultatul după 5 secunde
            setTimeout(() => {
                document.getElementById('result').style.display = 'none';
            }, 5000);
        }

        function cancelPreview() {
            document.getElementById('preview').style.display = 'none';
            currentImage = null;
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        currentLocation = {
                            lat: pos.coords.latitude.toFixed(6),
                            lon: pos.coords.longitude.toFixed(6)
                        };
                        document.getElementById('location').innerHTML = `📍 Locație: ${currentLocation.lat}, ${currentLocation.lon}`;
                    },
                    err => {
                        document.getElementById('location').innerHTML = '📍 Locație: indisponibilă';
                    }
                );
            }
        }

        function saveHistory() {
            localStorage.setItem('treeHistory', JSON.stringify(history));
        }

        function loadHistory() {
            const saved = localStorage.getItem('treeHistory');
            if (saved) {
                history = JSON.parse(saved);
                showHistory();
            }
        }

        function showHistory() {
            const container = document.getElementById('history');
            if (history.length === 0) {
                container.innerHTML = '<h3>📜 Istoric</h3><p>Nicio identificare încă</p>';
                return;
            }
            let html = '<h3>📜 Istoric</h3>';
            history.slice(0, 5).forEach(h => {
                html += `<div style="background:#f0f0f0; padding:10px; margin:5px 0; border-radius:10px;">
                            <strong>${h.species}</strong> (${h.confidence}%)<br>
                            <small>${new Date(h.date).toLocaleString()}</small>
                         </div>`;
            });
            container.innerHTML = html;
        }

        function clearHistory() {
            if (confirm('Ștergi tot istoricul?')) {
                history = [];
                saveHistory();
                showHistory();
            }
        }

        function exportCSV() {
            if (history.length === 0) {
                alert('Nu există date de exportat!');
                return;
            }
            let csv = "ID,Data,Specie,Confidenta,Latitudine,Longitudine\n";
            history.forEach(h => {
                csv += `${h.id},${new Date(h.date).toLocaleString()},${h.species},${h.confidence},${h.location?.lat || ''},${h.location?.lon || ''}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `treeid_${Date.now()}.csv`;
            link.click();
            alert('Date exportate cu succes!');
        }

        // Pornește aplicația
        init();
    </script>
</body>
</html>
